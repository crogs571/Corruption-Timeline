<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 Days of Corruption</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: clamp(26px, 6vw, 56px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  header h1 span { color: #e63329; }

  header p {
    margin-top: 10px;
    font-size: 11px;
    color: #555;
    font-family: Arial, sans-serif;
    letter-spacing: 0.1em;
  }

  .timeline {
    max-width: 1100px;
    margin: 0 auto;
  }

  .row { margin-bottom: 0; }

  .nodes {
    display: flex;
    align-items: center;
    padding: 0 10px;
  }

  .node-wrap {
    display: flex;
    align-items: center;
    flex: 1;
  }

  .line {
    flex: 1;
    height: 3px;
    background: #555;
    min-width: 6px;
  }

  .node {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 3px solid #aaa;
    background: #0e0e0e;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    z-index: 2;
  }

  .node.active, .node:hover {
    border-color: #e63329;
    background: #e63329;
  }

  .numbers {
    display: flex;
    padding: 4px 10px 0;
  }

  .num-cell {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: #777;
    font-weight: 700;
  }

  .labels {
    display: flex;
    padding: 6px 0 0;
    gap: 3px;
  }

  .label-cell {
    flex: 1;
    padding: 6px 3px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: background 0.2s, border-color 0.2s;
  }

  .label-cell:hover, .label-cell.active {
    background: rgba(230, 51, 41, 0.13);
    border-color: rgba(230, 51, 41, 0.3);
  }

  .label-date {
    font-size: clamp(8px, 1vw, 11px);
    font-weight: 900;
    color: #e8c84a;
    text-align: center;
    margin-bottom: 3px;
    line-height: 1.2;
  }

  .label-cell.active .label-date { color: #e63329; }

  .label-title {
    font-size: clamp(7px, 0.8vw, 9.5px);
    color: #ccc;
    text-align: center;
    line-height: 1.3;
    font-family: Arial, sans-serif;
    font-weight: 400;
  }

  .snake-connector {
    display: flex;
    padding: 2px 10px;
  }

  .snake-connector.right { justify-content: flex-end; }
  .snake-connector.left  { justify-content: flex-start; }

  .arc {
    width: 36px;
    height: 26px;
    border: 3px solid #555;
    border-top: none;
  }

  .arc.right {
    border-left: none;
    border-radius: 0 0 36px 0;
  }

  .arc.left {
    border-right: none;
    border-radius: 0 0 0 36px;
  }

  /* Detail panel */
  #detail-panel {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    border-top: 3px solid #e63329;
    padding: 20px 20px 28px;
    z-index: 300;
    max-height: 48vh;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.85);
  }

  #detail-panel.open { display: block; }

  .detail-inner {
    max-width: 760px;
    margin: 0 auto;
  }

  .detail-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .detail-meta {
    font-size: 11px;
    color: #e63329;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .detail-close {
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    border-radius: 4px;
    padding: 3px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: Arial, sans-serif;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .detail-close:hover { border-color: #aaa; color: #fff; }

  .detail-title {
    font-size: clamp(13px, 2vw, 17px);
    font-weight: 900;
    color: #fff;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .detail-body {
    font-size: clamp(12px, 1.5vw, 14px);
    color: #bbb;
    line-height: 1.65;
    font-family: Arial, sans-serif;
  }

  footer {
    text-align: center;
    margin-top: 36px;
    font-size: 11px;
    color: #444;
    font-family: Arial, sans-serif;
    letter-spacing: 0.07em;
  }
</style>
</head>

// Row layout matching the original chart
const rows = [
  { indices: [0,1,2,3,4], dir: 'ltr' },
  { indices: [10,9,8,7,6,5], dir: 'rtl' },
  { indices: [11,12,13,14,15,16], dir: 'ltr' },
  { indices: [22,21,20,19,18,17], dir: 'rtl' },
];

let activeNum = null;

function buildTimeline() {
  const container = document.getElementById('timeline');

  rows.forEach((row, rowIdx) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row';

    // Nodes row
    const nodesDiv = document.createElement('div');
    nodesDiv.className = 'nodes';

    row.indices.forEach((evIdx, i) => {
      const ev = events[evIdx];
      const wrap = document.createElement('div');
      wrap.className = 'node-wrap';

      if (i > 0) {
        const line = document.createElement('div');
        line.className = 'line';
        wrap.appendChild(line);
      }

      const node = document.createElement('div');
      node.className = 'node';
      node.id = 'node-' + ev.num;
      node.addEventListener('click', () => togglePanel(ev));
      wrap.appendChild(node);

      if (i < row.indices.length - 1) {
        const line = document.createElement('div');
        line.className = 'line';
        wrap.appendChild(line);
      }

      nodesDiv.appendChild(wrap);
    });

    rowDiv.appendChild(nodesDiv);

    // Numbers row
    const numsDiv = document.createElement('div');
    numsDiv.className = 'numbers';
    row.indices.forEach(evIdx => {
      const ev = events[evIdx];
      const cell = document.createElement('div');
      cell.className = 'num-cell';
      cell.textContent = ev.num;
      numsDiv.appendChild(cell);
    });
    rowDiv.appendChild(numsDiv);

    // Labels row
    const labelsDiv = document.createElement('div');
    labelsDiv.className = 'labels';
    row.indices.forEach(evIdx => {
      const ev = events[evIdx];
      const cell = document.createElement('div');
      cell.className = 'label-cell';
      cell.id = 'label-' + ev.num;
      cell.innerHTML = `<div class="label-date">${ev.date}</div><div class="label-title">${ev.title}</div>`;
      cell.addEventListener('click', () => togglePanel(ev));
      labelsDiv.appendChild(cell);
    });
    rowDiv.appendChild(labelsDiv);

    // Snake connector
    if (rowIdx < rows.length - 1) {
      const connector = document.createElement('div');
      connector.className = 'snake-connector ' + (row.dir === 'ltr' ? 'right' : 'left');
      const arc = document.createElement('div');
      arc.className = 'arc ' + (row.dir === 'ltr' ? 'right' : 'left');
      connector.appendChild(arc);
      rowDiv.appendChild(connector);
    }

    container.appendChild(rowDiv);
  });
}

function togglePanel(ev) {
  if (activeNum === ev.num) {
    closePanel();
    return;
  }

  // Clear previous active states
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.label-cell').forEach(l => l.classList.remove('active'));

  // Set new active
  activeNum = ev.num;
  const node = document.getElementById('node-' + ev.num);
  const label = document.getElementById('label-' + ev.num);
  if (node) node.classList.add('active');
  if (label) label.classList.add('active');

  // Populate panel
  document.getElementById('detail-meta').textContent = '#' + ev.num + ' · ' + ev.date;
  document.getElementById('detail-title').textContent = ev.title;
  document.getElementById('detail-body').textContent = ev.body;
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  activeNum = null;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.label-cell').forEach(l => l.classList.remove('active'));
  document.getElementById('detail-panel').classList.remove('open');
}

buildTimeline();
</script>
</body>
</html>
